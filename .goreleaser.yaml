version: 2

project_name: agent-inbox

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-inbox
    main: ./
    binary: agent-inbox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: im-tyler
    name: agent-inbox
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## agent-inbox v{{.Version}}

    Federated supervisor for CLI coding agents — Claude Code, OpenCode, Codex.
